name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Enable GitHub Pages and switch its build source to "GitHub Actions"
      # via the API, so this deploy works even if Pages was previously set to
      # "Deploy from a branch". (enablement: true creates/updates the Pages site.)
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Build the Vite app directly. We intentionally do NOT run `npm run build`,
      # because that also runs the GlueUp scraper (needs credentials). The member
      # and event data is already committed under public/data/ by the scheduled
      # scrape-glueup.yml workflow and is bundled into dist/ by Vite.
      - name: Build site
        run: npx vite build

      # GitHub Pages has no server-side SPA fallback. With BrowserRouter, a refresh
      # on a deep link (e.g. /about) would 404. Serving index.html as 404.html lets
      # the client-side router handle those routes.
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      # CNAME lives at the repo root (outside public/), so Vite doesn't copy it.
      # Include it in the artifact so the custom domain stays attached.
      - name: Add custom domain (CNAME)
        run: cp CNAME dist/CNAME

      # Stop GitHub Pages from running Jekyll over the static output.
      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
